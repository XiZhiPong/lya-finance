name: lya_finance
description: "Lya Finance - Liquid Crystal UI"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  liquid_pull_to_refresh: ^3.0.1
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
