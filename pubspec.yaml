  csv: ^6.0.0
  pdf: ^3.10.0
  printing: ^5.12.0
  percent_indicator: ^4.2.3
  animated_bottom_navigation_bar: ^1.3.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
